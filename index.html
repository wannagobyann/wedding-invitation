<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">

    <title>웅전 ♥ 미영 결혼합니다</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Malgun Gothic', '맑은 고딕', sans-serif;
            /* PC 배경색을 조금 더 밝은 회색으로 변경하여 대비를 줌 */
            background-color: #f4f4f4; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 640px; /* PC에서도 이 폭을 유지 */
            background-color: #efe8d8;
            position: relative;
            /* PC에서 초대장 느낌이 나도록 그림자 추가 */
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .content {
            width: 100%;
            /* 하단 전체 여백을 60px -> 20px로 대폭 축소 */
            padding-bottom: 20px; 
        }

        .content img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 네비게이션 버튼 (카카오 길찾기) */
        .navigation-button-container {
            display: flex;
            justify-content: center;
            padding: 20px;
            background-color: #efe8d8;
        }

        .navigation-button {
            display: inline-block;
            background: linear-gradient(135deg, #FEE500 0%, #FFCD00 100%);
            color: #3C1E1E;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(255, 205, 0, 0.2);
            border: 2px solid #FFCD00;
            text-align: center;
        }

        /* 마음 전하실 곳 버튼 (여백 조정) */
        .floating-button {
            display: block;
            /* 상단 여백 30px, 하단 여백 10px로 조정 */
            margin: 30px auto 10px; 
            position: relative;
            background: linear-gradient(135deg, #4CAF50 0%, #2E8B57 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 80%; /* 모바일/PC 모두 적당한 너비 유지 */
            max-width: 300px;
        }

        /* 팝업 및 기타 스타일 (기존 유지) */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px); }
        .popup-overlay.show { display: flex; }
        .popup { background: white; border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .section-title { font-size: 16px; font-weight: 700; color: #333; text-align: center; margin-bottom: 15px; padding: 8px 0; background: #f8f9fa; border-radius: 8px; border: 1px solid #dee2e6; }
        .account-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid #e9ecef; }
        .account-name { font-size: 15px; font-weight: 600; }
        .account-number { font-size: 13px; color: #666; }
        .copy-btn { background: #4CAF50; color: white; border: none; padding: 6px 12px; border-radius: 15px; font-size: 11px; cursor: pointer; }
        .close-button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #eee; color: #666; cursor: pointer; margin-top: 10px; }
        
        .copy-success { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #28a745; color: white; padding: 12px 24px; border-radius: 25px; z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .copy-success.show { opacity: 1; }
        /* --- 꽃 날리는 효과 스타일 (이미지 버전) --- */
        .petal-container {
         position: fixed;
         top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none; /* 클릭 방해 금지 */
        z-index: 10; /* 이미지들 위에 표시 (팝업보단 아래) */
        overflow: hidden;
        }

        .petal {
        position: absolute;
        /* --- 기존 색상/모양 코드 삭제 후 아래 코드 추가 --- */
        background-image: url('./flower.png'); /* 업로드한 꽃 이미지 경로 */
        background-size: contain; /* 이미지가 찌그러지지 않고 비율 유지 */
        background-repeat: no-repeat;
        background-position: center;
        /* ------------------------------------------------ */
        opacity: 0.9; /* 꽃 이미지가 살짝 투명하게 */
        animation: fall linear infinite;
        }

        /* 꽃이 떨어지는 애니메이션 정의 (기존과 동일) */
    @keyframes fall {
    0% {
        top: -10%;
        transform: translateX(0) rotate(0deg);
        opacity: 0.9;
    }
    100% {
        top: 110%; /* 화면 아래까지 */
        transform: translateX(100px) rotate(360deg); /* 오른쪽으로 가면서 회전 */
        opacity: 0; /* 사라짐 */
            }
        }

    /* 다양한 크기와 속도의 꽃들 (N번째 꽃마다 설정) */
    /* 만드신 이미지의 원래 비율에 맞춰 width, height 값을 조절하세요 */
    .petal:nth-child(1) { width: 25px; height: 25px; left: 10%; animation-duration: 10s; animation-delay: 0s; }
    .petal:nth-child(2) { width: 20px; height: 20px; left: 20%; animation-duration: 12s; animation-delay: 2s; opacity: 0.7; } /* 조금 더 투명하게 */
    .petal:nth-child(3) { width: 30px; height: 30px; left: 35%; animation-duration: 8s; animation-delay: 4s; }
    .petal:nth-child(4) { width: 22px; height: 22px; left: 50%; animation-duration: 15s; animation-delay: 1s; opacity: 0.8; }
    .petal:nth-child(5) { width: 28px; height: 28px; left: 65%; animation-duration: 9s; animation-delay: 3s; }
    .petal:nth-child(6) { width: 20px; height: 20px; left: 80%; animation-duration: 13s; animation-delay: 5s; opacity: 0.7; }
    .petal:nth-child(7) { width: 26px; height: 26px; left: 90%; animation-duration: 11s; animation-delay: 2s; }
    .petal:nth-child(8) { width: 30px; height: 30px; left: 25%; animation-duration: 10s; animation-delay: 6s; }
    .petal:nth-child(9) { width: 24px; height: 24px; left: 45%; animation-duration: 14s; animation-delay: 3s; opacity: 0.8; }
    .petal:nth-child(10) { width: 28px; height: 28px; left: 75%; animation-duration: 9s; animation-delay: 7s; }
        
        /* 모바일 최적화 */
        @media (max-width: 768px) {
            body { background-color: #efe8d8; } /* 모바일은 배경색 통일 */
            .container { box-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="petal-container">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
    </div>
    <div class="container">
        <div class="content">
            <img src="./001.jpg" />
            <img src="./002.jpg" />
            <img src="./003.jpg" />
            
            <div class="navigation-button-container">
                <a href="https://map.kakao.com/?map_type=TYPE_MAP&target=car&rt=,,310239,917572&rt2=%EC%8A%A4%EC%99%84%EB%A0%88%EC%8A%A4%ED%86%A0%EB%9E%91&rtIds=,8082599" 
                   target="_blank" class="navigation-button">
                    📍 카카오 길찾기
                </a>
            </div>
            
            <img src="./004.jpg" />

            <button class="floating-button" onclick="showPopup()">마음 전하실 곳</button>
        </div>
    </div>

    <div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
        <div class="popup">
            <div class="section-title">신랑측</div>
            <div class="account-item">
                <div class="account-details">
                    <div class="account-name">오석현</div>
                    <div class="account-number">국민 467101-04-106702</div>
                </div>
                <button class="copy-btn" onclick="copyAccountNumber('국민 467101-04-106702')">복사</button>
            </div>
            <div class="account-item">
                <div class="account-details">
                    <div class="account-name">이순옥</div>
                    <div class="account-number">기업 010-5409-5889</div>
                </div>
                <button class="copy-btn" onclick="copyAccountNumber('기업 010-5409-5889')">복사</button>
            </div>

            <div class="section-title" style="margin-top:20px;">신부측</div>
            <div class="account-item">
                <div class="account-details">
                    <div class="account-name">김용록</div>
                    <div class="account-number">농협 477172-51-019329</div>
                </div>
                <button class="copy-btn" onclick="copyAccountNumber('농협 477172-51-019329')">복사</button>
            </div>
            <div class="account-item">
                <div class="account-details">
                    <div class="account-name">지숙경</div>
                    <div class="account-number">하나 665-121742-00108</div>
                </div>
                <button class="copy-btn" onclick="copyAccountNumber('하나 665-121742-00108')">복사</button>
            </div>
            <button class="close-button" onclick="closePopup()">닫기</button>
        </div>
    </div>

    <div class="copy-success" id="copySuccess">계좌번호가 복사되었습니다</div>

    <script>
        function showPopup() { document.getElementById('popupOverlay').classList.add('show'); }
        function closePopup(event) { if (event && event.target !== event.currentTarget) return; document.getElementById('popupOverlay').classList.remove('show'); }
        function copyAccountNumber(text) {
            navigator.clipboard.writeText(text).then(() => {
                const msg = document.getElementById('copySuccess');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 2000);
            });
        }
    </script>
</body>
</html>
