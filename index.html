<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">

    <title>웅전 ♥ 미영 결혼합니다</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: rgb(238, 238, 238);
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 640px;
            background-color: #efe8d8;
            min-height: 100vh;
            position: relative;
            margin: 0 auto;
        }

        .content {
            width: 100%;
            /* 버튼 아래 여백을 주어 페이지 끝이 너무 답답하지 않게 조절 */
            padding-bottom: 40px; 
        }

        .content img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 네비게이션 버튼 (카카오 길찾기) */
        .navigation-button-container {
            display: flex;
            justify-content: center;
            padding: 25px 20px;
            background-color: #efe8d8;
        }

        .navigation-button {
            display: inline-block;
            background: linear-gradient(135deg, #FEE500 0%, #FFCD00 100%);
            color: #3C1E1E;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 205, 0, 0.3);
            transition: all 0.3s ease;
            border: 2px solid #FFCD00;
            text-align: center;
            min-width: 180px;
        }

        /* 마음 전하실 곳 버튼 (완전 고정형) */
        .floating-button {
            display: block;
            margin: 40px auto 0; /* 이미지와의 상단 간격 40px */
            position: relative;  /* 화면에 고정되지 않고 흐름을 따름 */
            
            background: linear-gradient(135deg, #4CAF50 0%, #2E8B57 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            white-space: nowrap;
            min-width: 240px;
            text-align: center;
        }

        .floating-button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        /* 팝업 스타일 생략 (기존과 동일) */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px); }
        .popup-overlay.show { display: flex; }
        .popup { background: white; border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3); transform: scale(0.9); transition: transform 0.3s ease; }
        .popup-overlay.show .popup { transform: scale(1); }
        .popup-header { text-align: center; margin-bottom: 25px; }
        .popup-header h3 { font-size: 20px; color: #333; margin-bottom: 8px; }
